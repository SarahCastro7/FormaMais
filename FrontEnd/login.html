<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css/login.css">



    <title>forma+ Login</title>
</head>

<body>

    <div class="card">
        <button class="fechar">&times;</button>

        <div class="topo">
            <div class="logo">F+</div>
        </div>

        <h2>Bem-vindo de volta!</h2>
        <p class="subtitulo">Entre para continuar sua jornada</p>

        <form id="loginForm">
            <div class="campo">
                <label for="email">Email</label>
                <div class="input-box">
                    <i class="fa-regular fa-envelope icone"></i>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
            </div>

            <div class="campo">
                <label for="password">Senha</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock icone"></i>
                    <input type="password" id="password" placeholder="********" required>
                    <i class="fa-regular fa-eye ver-senha" id="togglePassword"></i>
                </div>
            </div>

            <div class="opcoes">
                <label class="lembrar">
                    <input type="checkbox"> Lembrar-me
                </label>
                <a href="#" class="esqueci">Esqueci a senha</a>
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <div class="linha">
            <span>ou continue com</span>
        </div>

        <div class="redes">
            <button class="btn-rede google">
                <img src="img.login/google.png" alt="Google Logo" width="18"> Google
            </button>

            <button class="btn-rede facebook">
                <img src="img.login/facebook.png" alt="Facebook Logo" width="18"> Facebook
            </button>
        </div>


        <p class="cadastro">Não tem uma conta? <a href="#">Cadastre-se gratuitamente</a></p>
    </div>

    <script src="forma.js/login.js"></script>
</body>

</html>
